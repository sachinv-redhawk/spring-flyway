# ================================================================
# Spring Profile: scenario2
# Overrides: baseline settings to simulate "existing database"
#
# How to run:
#   .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=scenario2"
# ================================================================

# Tell Flyway: "DB already has schema up to V6, start tracking from here"
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=6
