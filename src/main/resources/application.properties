spring.application.name=flyway-demo

# =============================================
# H2 File-Based Database Configuration
# =============================================
spring.datasource.url=jdbc:h2:file:./demodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (visit http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
# IMPORTANT: Set ddl-auto to 'none' so Flyway owns the schema, not Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Flyway Configuration
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
# Uncomment the line below ONLY when introducing Flyway to an existing database:
# spring.flyway.baseline-on-migrate=true
# spring.flyway.baseline-version=0

# Flyway history table name (default: flyway_schema_history)
spring.flyway.table=flyway_schema_history

# Logging
logging.level.org.flywaydb=DEBUG
